name: Build Executables
on: [push]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install kineticstoolkit PyQt5 matplotlib numpy
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconsole --onefile --collect-all kineticstoolkit HipOA.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GaitApp-${{ matrix.os }}
          path: dist/
