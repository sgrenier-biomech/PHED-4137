name: Build Executables
on: [push]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            app_name: "GaitApp_Windows"
          - os: macos-13  # Better compatibility for Intel/Older Macs than 'latest'
            app_name: "GaitApp_macOS"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Auto-locate and Move Script
        shell: bash
        run: |
          find . -maxdepth 3 -name "*.py" ! -name "build.yml" -exec cp {} ./app_to_build.py \;
          ls -R

      - name: Install dependencies
        run: |
          pip install numpy matplotlib scipy PyQt5 ezc3d kineticstoolkit pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Windows remains as a single .exe
            pyinstaller --noconsole --onefile --collect-all kineticstoolkit --name "${{ matrix.app_name }}" app_to_build.py
          else
            # MacOS Build with 11.5 Target
            # Using --windowed creates a proper .app bundle which is better for Mac users
            export MACOSX_DEPLOYMENT_TARGET=11.5
            pyinstaller --noconsole --windowed --collect-all kineticstoolkit --name "${{ matrix.app_name }}" app_to_build.py
            
            # Zip the .app because GitHub Artifacts don't preserve Mac file permissions well
            cd dist
            zip -r "${{ matrix.app_name }}_BigSur.zip" "${{ matrix.app_name }}.app"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app_name }}
          # Path logic: Upload the .exe for Windows, but the .zip for Mac
          path: |
            dist/*.exe
            dist/*.zip
