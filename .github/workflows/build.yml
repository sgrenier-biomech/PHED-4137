name: Build Executables
on: [push]

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Auto-locate and Move Script
        # This looks for any .py file that IS NOT build.yml and moves it to the root
        # It handles spaces and folder depth automatically.
        shell: bash
        run: |
          find . -maxdepth 3 -name "*.py" ! -name "build.yml" -exec cp {} ./app_to_build.py \;
          ls -R # This shows us exactly what was found in the logs

      - name: Install dependencies
        run: |
          pip install numpy matplotlib scipy PyQt5 ezc3d kineticstoolkit pyinstaller

      - name: Build with PyInstaller
        # We now build the 'app_to_build.py' we just created
        run: |
          pyinstaller --noconsole --onefile --collect-all kineticstoolkit app_to_build.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GaitApp-Build-${{ matrix.os }}
          path: dist/
