name: Build Executables
on: [push]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            app_name: "GaitApp_Windows"
          - os: macos-13  # Most stable runner for older macOS 11.5 compatibility
            app_name: "GaitApp_macOS"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Auto-locate and Move Script
        shell: bash
        run: |
          find . -maxdepth 3 -name "*.py" ! -name "build.yml" -exec cp {} ./app_to_build.py \;
          ls -R

      - name: Install dependencies
        run: |
          pip install numpy matplotlib scipy PyQt5 ezc3d kineticstoolkit pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            # Windows: standard single executable
            pyinstaller --noconsole --onefile --collect-all kineticstoolkit --name "${{ matrix.app_name }}" app_to_build.py
          else
            # macOS: Targeting Big Sur 11.5
            export MACOSX_DEPLOYMENT_TARGET=11.5
            # --windowed is required to create a .app bundle
            pyinstaller --noconsole --windowed --collect-all kineticstoolkit --name "${{ matrix.app_name }}" app_to_build.py
            
            # ZIP the app folder to preserve executable permissions for students
            cd dist
            zip -r "${{ matrix.app_name }}_v1.6_Mac.zip" "${{ matrix.app_name }}.app"
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app_name }}
          # Upload the .exe for Windows and the .zip for macOS
          path: |
            dist/*.exe
            dist/*.zip
